<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Holdings — 企業概念サイト・リデザイン</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

<style>
  :root {
    --bg: oklch(0.97 0.005 80);
    --ink: oklch(0.18 0.01 60);
    --ink-soft: oklch(0.42 0.01 60);
    --ink-faint: oklch(0.72 0.008 60);
    --rule: oklch(0.86 0.008 60);
    --panel: oklch(0.94 0.006 80);
    --accent: oklch(0.58 0.16 35);
    --accent-ink: oklch(0.97 0.005 80);

    --serif: "Noto Serif JP", "Hiragino Mincho ProN", "Yu Mincho", serif;
    --sans: "Inter", "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
    --mono: "JetBrains Mono", ui-monospace, monospace;

    --space: clamp(16px, 2vw, 28px);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--bg); color: var(--ink); font-family: var(--sans); -webkit-font-smoothing: antialiased; }
  body { overflow-x: hidden; }
  a { color: inherit; text-decoration: none; }
  img, svg { display: block; max-width: 100%; }

  ::selection { background: var(--accent); color: var(--accent-ink); }

  /* Body theme hooks */
  body[data-theme="mono"] { --accent: oklch(0.24 0.01 60); }
  body[data-theme="indigo"] { --accent: oklch(0.48 0.14 260); }
  body[data-theme="forest"] { --accent: oklch(0.48 0.09 150); }
  body[data-theme="ink"]    { --accent: oklch(0.58 0.16 35); }

  body[data-density="tight"]  { --space: clamp(12px, 1.4vw, 20px); }
  body[data-density="relaxed"]{ --space: clamp(18px, 2.6vw, 36px); }

  #root { min-height: 100vh; }
</style>
</head>
<body data-theme="ink" data-density="normal">
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
