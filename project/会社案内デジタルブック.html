<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>株式会社マーシャルアーツ — 会社案内デジタルブック</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --paper: oklch(0.97 0.005 80);
    --ink: oklch(0.18 0.01 60);
    --ink-soft: oklch(0.44 0.01 60);
    --rule: oklch(0.86 0.008 60);
    --panel: oklch(0.93 0.006 80);
    --accent: oklch(0.58 0.16 35);
    --stage: oklch(0.20 0.008 60);
    --serif: "Noto Serif JP", "Hiragino Mincho ProN", "Yu Mincho", serif;
    --sans: "Inter", "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
    --mono: "JetBrains Mono", ui-monospace, monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: var(--stage); font-family: var(--sans); color: var(--ink); -webkit-font-smoothing: antialiased; }
  body { overflow: hidden; }
  img { display: block; }
  ::selection { background: var(--accent); color: var(--paper); }
  #root { height: 100%; }
</style>
</head>
<body>
  <div id="root"></div>
  <template id="__bundler_thumbnail">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
      <rect width="100" height="100" fill="#1b1b1d" />
      <rect x="30" y="22" width="40" height="56" fill="#2b2b2e" stroke="#c2603f" stroke-width="1.5" />
      <rect x="50" y="22" width="20" height="56" fill="#222225" />
      <line x1="50" y1="22" x2="50" y2="78" stroke="#c2603f" stroke-width="1" />
      <rect x="56" y="34" width="9" height="3" fill="#c2603f" />
    </svg>
  </template>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="book.jsx"></script>
</body>
</html>
